<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador · Vidrios y Aluminio El Castillo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0F3D6E;
  --primary-dark: #0A2B4F;
  --primary-light: #E8F0F7;
  --primary-soft: #D6E4EE;
  --accent: #E07B3F;
  --accent-soft: #FCE8DC;
  --whatsapp: #25D366;
  --success: #16A34A;
  --warning: #F59E0B;
  --danger: #DC2626;
  --ink: #1A2332;
  --ink-mute: #5A6878;
  --ink-soft: #93A0AE;
  --bg: #F7F9FB;
  --surface: #FFFFFF;
  --border: #E1E6EC;
  --border-strong: #C8D2DB;
  --shadow-sm: 0 1px 2px rgba(15, 61, 110, 0.06);
  --shadow: 0 4px 16px rgba(15, 61, 110, 0.08), 0 1px 2px rgba(15, 61, 110, 0.06);
  --shadow-lg: 0 16px 48px rgba(15, 61, 110, 0.18), 0 4px 12px rgba(15, 61, 110, 0.08);
  --radius: 8px;
  --radius-sm: 5px;
  --radius-lg: 12px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; font-size: 14px; }

/* === TOPBAR === */
.app { min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 30;
  box-shadow: var(--shadow-sm);
}
.brand-mark { display: flex; align-items: center; gap: 12px; }
.logo-mark { display: flex; align-items: center; justify-content: center; }
.brand-name { font-weight: 700; font-size: 15px; color: var(--primary); letter-spacing: -0.01em; }
.brand-sub { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 1px; }
.mode-toggle { display: flex; gap: 4px; padding: 4px; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); }
.mode-toggle button {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 5px;
  font-size: 13px; font-weight: 500; color: var(--ink-mute);
  transition: all 0.15s;
}
.mode-toggle button:hover { color: var(--primary); }
.mode-toggle button.active { background: var(--primary); color: white; box-shadow: var(--shadow-sm); }

/* === MAIN === */
main { flex: 1; }
.appfoot {
  padding: 14px 24px; background: white; border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--ink-soft);
}

/* === HERO + SEARCH === */
.catalog-view { max-width: 1400px; margin: 0 auto; padding: 24px; }
.catalog-hero {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  border-radius: var(--radius-lg);
  padding: 32px 36px;
  color: white;
  margin-bottom: 20px;
  display: grid; grid-template-columns: 1fr 1.4fr; gap: 32px; align-items: center;
}
.hero-text h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
.hero-text p { margin: 8px 0 0; font-size: 14px; opacity: 0.85; line-height: 1.5; }

.search-box {
  position: relative; background: white; border-radius: var(--radius);
  display: flex; align-items: center; padding: 0 16px; height: 52px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.search-icon { color: var(--ink-mute); flex-shrink: 0; }
.search-box input {
  flex: 1; border: none; outline: none; background: transparent;
  padding: 0 12px; font-size: 15px; color: var(--ink);
}
.search-box input::placeholder { color: var(--ink-soft); }
.clear-btn {
  width: 26px; height: 26px; border-radius: 50%; background: var(--bg);
  color: var(--ink-mute); font-size: 18px; line-height: 1;
}
.clear-btn:hover { background: var(--border); color: var(--ink); }
.suggestions {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: white; border-radius: var(--radius); box-shadow: var(--shadow-lg);
  overflow: hidden; z-index: 10;
}
.suggestion {
  display: flex; align-items: center; gap: 10px; padding: 11px 16px;
  font-size: 13px; color: var(--ink); cursor: pointer; transition: background 0.1s;
}
.suggestion:hover { background: var(--primary-light); color: var(--primary); }
.suggestion svg { color: var(--ink-soft); }

/* === CATEGORY BAR === */
.catalog-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; gap: 16px; flex-wrap: wrap;
}
.cats { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; background: white; border: 1px solid var(--border);
  border-radius: 100px; font-size: 13px; color: var(--ink-mute); font-weight: 500;
  transition: all 0.15s;
}
.cat-pill:hover { border-color: var(--primary); color: var(--primary); }
.cat-pill.active { background: var(--primary); color: white; border-color: var(--primary); }
.cat-count { background: rgba(255,255,255,0.25); padding: 1px 7px; border-radius: 100px; font-size: 11px; font-weight: 600; }
.cat-pill:not(.active) .cat-count { background: var(--bg); color: var(--ink-soft); }

.view-toggle { display: flex; gap: 0; background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.view-toggle button {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; font-size: 13px; color: var(--ink-mute); font-weight: 500;
}
.view-toggle button.active { background: var(--primary); color: white; }

.results-info { font-size: 13px; color: var(--ink-mute); margin-bottom: 12px; }
.results-info strong { color: var(--primary); }
.results-info em { color: var(--ink); font-style: normal; }

/* === GRID === */
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.card {
  background: white; border: 1px solid var(--border); border-radius: var(--radius-lg);
  overflow: hidden; transition: all 0.2s;
  display: flex; flex-direction: column;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--border-strong); }
.card-img {
  position: relative; height: 180px; cursor: zoom-in;
  background: linear-gradient(135deg, #F0F4F8 0%, #DCE5ED 100%);
  overflow: hidden;
}
.card-img > svg { width: 80%; height: 80%; margin: 10%; }
.card-img:hover .zoom-hint { opacity: 1; transform: scale(1); }
.zoom-hint {
  position: absolute; top: 10px; right: 10px;
  background: rgba(15,61,110,0.85); color: white;
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: scale(0.8); transition: all 0.2s;
}
.card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; }
.card-code { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); letter-spacing: 0.02em; }
.card-title { font-size: 15px; font-weight: 600; color: var(--ink); margin-top: 4px; line-height: 1.3; }
.card-meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 11px; color: var(--ink-mute); flex-wrap: wrap; }
.chip { background: var(--primary-light); color: var(--primary); padding: 2px 8px; border-radius: 100px; font-weight: 600; font-size: 10px; letter-spacing: 0.02em; text-transform: uppercase; }
.dim { color: var(--ink-mute); font-family: 'JetBrains Mono', monospace; }
.card-foot { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; padding-top: 12px; gap: 10px; }
.price { font-size: 18px; font-weight: 700; color: var(--primary); letter-spacing: -0.01em; }
.stock { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--success); margin-top: 3px; font-weight: 500; }
.stock.low { color: var(--warning); }
.stock-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 0 3px color-mix(in srgb, currentColor 20%, transparent); }
.unit { color: var(--ink-soft); font-weight: 400; }

.qty-add { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.qty {
  display: flex; align-items: center; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; height: 30px;
}
.qty button { width: 26px; height: 28px; background: var(--bg); color: var(--ink); font-size: 14px; font-weight: 600; }
.qty button:hover { background: var(--primary-light); color: var(--primary); }
.qty input { width: 36px; text-align: center; border: none; outline: none; font-size: 13px; font-weight: 600; padding: 0; }
.qty input::-webkit-inner-spin-button, .qty input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.qty.mini { height: 26px; }
.qty.mini button { width: 22px; height: 24px; font-size: 12px; }
.qty.mini span { display: inline-block; min-width: 22px; text-align: center; font-size: 12px; font-weight: 600; }

.btn-add {
  display: flex; align-items: center; gap: 5px;
  padding: 7px 12px; background: var(--primary); color: white;
  border-radius: 6px; font-size: 12px; font-weight: 600;
  transition: all 0.15s;
}
.btn-add:hover { background: var(--primary-dark); }

/* === LIST VIEW === */
.list-view { display: flex; flex-direction: column; gap: 24px; }
.list-group { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.list-group-header {
  padding: 14px 20px; background: linear-gradient(135deg, var(--primary-light) 0%, white 100%);
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.list-group-header h3 { margin: 0; font-size: 15px; color: var(--primary); font-weight: 700; }
.list-group-header span { font-size: 12px; color: var(--ink-mute); }
.list-table { display: flex; flex-direction: column; }
.list-row {
  display: grid;
  grid-template-columns: 64px 90px 1fr 130px 80px 100px 200px;
  gap: 12px; padding: 8px 16px;
  align-items: center; border-bottom: 1px solid var(--border);
  font-size: 13px;
  transition: background 0.1s;
}
.list-row:last-child { border-bottom: none; }
.list-row:hover:not(.list-head) { background: var(--bg); }
.list-row.list-head {
  background: var(--bg); padding: 10px 16px;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--ink-mute); font-weight: 600;
}
.list-row .cell-img { height: 48px; cursor: zoom-in; border-radius: 4px; overflow: hidden; background: var(--bg); display: flex; align-items: center; justify-content: center; }
.list-row .cell-img svg { width: 100%; height: 100%; }
.list-row .cell-code { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); }
.list-row .cell-desc { font-weight: 500; }
.list-row .cell-dim { color: var(--ink-mute); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
.list-row .cell-price { font-weight: 700; color: var(--primary); }
.list-row .cell-actions { display: flex; gap: 6px; justify-content: flex-end; align-items: center; }

/* === EMPTY === */
.empty {
  text-align: center; padding: 80px 20px;
  color: var(--ink-mute);
}
.empty svg { color: var(--ink-soft); margin-bottom: 16px; }
.empty p { margin: 8px 0 16px; font-size: 15px; }
.empty button { color: var(--primary); font-weight: 600; padding: 8px 16px; border: 1px solid var(--primary); border-radius: 6px; }
.empty button:hover { background: var(--primary-light); }

/* === LIGHTBOX === */
.lightbox {
  position: fixed; inset: 0; background: rgba(15, 35, 50, 0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 24px;
  animation: fadein 0.2s;
}
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
.lightbox-inner {
  background: white; border-radius: var(--radius-lg); overflow: hidden;
  display: grid; grid-template-columns: 1.2fr 1fr;
  max-width: 1000px; width: 100%; max-height: 90vh;
  position: relative;
  animation: zoomin 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes zoomin { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.lightbox-close {
  position: absolute; top: 12px; right: 12px; z-index: 5;
  width: 36px; height: 36px; border-radius: 50%;
  background: white; color: var(--ink); font-size: 22px; line-height: 1;
  box-shadow: var(--shadow);
}
.lightbox-close:hover { background: var(--bg); }
.lightbox-img {
  background: linear-gradient(135deg, #E8EEF3 0%, #C8D6E0 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 32px;
  min-height: 480px;
}
.lightbox-img > svg { max-width: 100%; max-height: 100%; }
.lightbox-info { padding: 32px; display: flex; flex-direction: column; }
.lb-code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-soft); }
.lightbox-info h2 { margin: 6px 0 4px; font-size: 24px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; }
.lb-cat { color: var(--primary); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.lb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; margin: 24px 0; }
.lb-grid label { display: block; font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.lb-grid > div > div { font-size: 15px; font-weight: 500; color: var(--ink); }
.lb-price { font-size: 22px !important; font-weight: 700 !important; color: var(--primary) !important; }
.lb-note { font-size: 11px; color: var(--ink-soft); margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }

/* === CART FAB === */
.cart-fab {
  position: fixed; bottom: 24px; right: 24px; z-index: 50;
  display: flex; align-items: center; gap: 14px;
  padding: 14px 22px; background: var(--primary); color: white;
  border-radius: 100px; box-shadow: var(--shadow-lg);
  font-weight: 600; font-size: 14px;
  transition: all 0.2s;
}
.cart-fab:hover { transform: translateY(-2px); background: var(--primary-dark); }
.cart-count-badge {
  background: var(--accent); color: white;
  padding: 2px 9px; border-radius: 100px; font-size: 12px; font-weight: 700;
}
.cart-fab-total { font-family: 'JetBrains Mono', monospace; font-size: 14px; }
.cart-fab-cta { font-weight: 600; padding-left: 10px; border-left: 1px solid rgba(255,255,255,0.25); }

/* === DRAWER === */
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(15, 35, 50, 0.5);
  display: flex; justify-content: flex-end; z-index: 100;
  animation: fadein 0.2s;
}
.drawer {
  width: 480px; max-width: 100vw; background: white; height: 100vh;
  display: flex; flex-direction: column;
  animation: slidein 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slidein { from { transform: translateX(100%); } to { transform: translateX(0); } }
.drawer-head { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.drawer-head h2 { margin: 0; font-size: 18px; font-weight: 700; color: var(--ink); }
.drawer-head button { font-size: 28px; color: var(--ink-mute); width: 32px; height: 32px; border-radius: 6px; line-height: 1; }
.drawer-head button:hover { background: var(--bg); color: var(--ink); }
.drawer-body { flex: 1; overflow-y: auto; padding: 16px 24px; }
.empty-cart { text-align: center; color: var(--ink-mute); padding: 60px 0; }
.cart-item {
  display: grid; grid-template-columns: 56px 1fr auto;
  gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border);
}
.cart-item:last-child { border-bottom: none; }
.cart-item-img { height: 56px; border-radius: 6px; overflow: hidden; background: var(--bg); }
.cart-item-img svg { width: 100%; height: 100%; }
.cart-item-code { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-soft); }
.cart-item-name { font-weight: 600; font-size: 14px; }
.cart-item-dim { font-size: 11px; color: var(--ink-mute); margin-top: 2px; }
.cart-item-price { font-size: 12px; color: var(--ink-mute); margin-top: 4px; }
.cart-item-price span { color: var(--ink-soft); }
.cart-item-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.cart-item-total { font-weight: 700; color: var(--primary); font-size: 14px; }
.link-danger { color: var(--danger); font-size: 11px; font-weight: 500; }
.link-danger:hover { text-decoration: underline; }
.drawer-foot { padding: 20px 24px; border-top: 1px solid var(--border); background: var(--bg); }
.drawer-foot .row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
.drawer-foot .row strong { font-size: 22px; color: var(--primary); font-family: 'JetBrains Mono', monospace; }
.disclaimer { font-size: 11px; color: var(--ink-mute); padding: 10px 12px; background: #FFF8E1; border-left: 3px solid var(--warning); border-radius: 4px; margin: 12px 0; }
.disclaimer strong { color: #5C4310; }

.btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--primary); color: white;
  padding: 10px 18px; border-radius: var(--radius);
  font-weight: 600; font-size: 14px; transition: all 0.15s;
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary.big { padding: 14px 22px; font-size: 15px; width: 100%; }
.btn-secondary {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  background: white; color: var(--ink); border: 1px solid var(--border);
  padding: 10px 18px; border-radius: var(--radius); font-weight: 500; font-size: 14px;
}
.btn-secondary:hover { background: var(--bg); border-color: var(--border-strong); }

/* === CHECKOUT === */
.checkout { max-width: 1200px; margin: 0 auto; padding: 24px; }
.checkout-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 24px; flex-wrap: wrap; }
.back-btn { display: flex; align-items: center; gap: 6px; color: var(--primary); font-weight: 600; padding: 8px 14px; border-radius: 6px; font-size: 13px; }
.back-btn:hover { background: var(--primary-light); }
.stepper { display: flex; align-items: center; gap: 8px; }
.step { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); font-weight: 500; }
.step span { width: 26px; height: 26px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; }
.step.active { color: var(--primary); }
.step.active span { background: var(--primary); color: white; border-color: var(--primary); }
.step-bar { width: 32px; height: 1px; background: var(--border); }

.checkout-body { display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; }
.checkout-form { background: white; padding: 28px; border-radius: var(--radius-lg); border: 1px solid var(--border); }
.checkout-form h2 { margin: 0 0 4px; font-size: 20px; }
.subtitle { color: var(--ink-mute); font-size: 13px; margin: 0 0 20px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; color: var(--ink-mute); margin-bottom: 6px; font-weight: 500; }
.field input, .field textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px;
  outline: none; transition: all 0.15s;
}
.field input:focus, .field textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
.field input.error { border-color: var(--danger); }
.err-msg { font-size: 11px; color: var(--danger); margin-top: 4px; display: block; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.checkout-summary { background: white; padding: 24px; border-radius: var(--radius-lg); border: 1px solid var(--border); align-self: flex-start; position: sticky; top: 80px; }
.checkout-summary h3 { margin: 0 0 16px; font-size: 15px; }
.sum-list { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; padding-right: 4px; }
.sum-item { display: flex; justify-content: space-between; gap: 12px; font-size: 13px; padding-bottom: 10px; border-bottom: 1px dashed var(--border); }
.sum-item span:first-child { color: var(--ink); }
.sum-item span:last-child { color: var(--primary); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.sum-total { display: flex; justify-content: space-between; align-items: baseline; padding-top: 16px; margin-top: 14px; border-top: 2px solid var(--primary); }
.sum-total span { font-size: 13px; color: var(--ink-mute); }
.sum-total strong { font-size: 22px; color: var(--primary); font-family: 'JetBrains Mono', monospace; }
.micro { font-size: 10px; color: var(--ink-soft); margin-top: 8px; }

/* PDF Preview */
.checkout-preview { display: flex; flex-direction: column; gap: 20px; }
.preview-actions h2 { margin: 0; font-size: 22px; }
.preview-actions p { margin: 4px 0 0; color: var(--ink-mute); font-size: 13px; }
.pdf-preview {
  background: white; padding: 36px 40px; border-radius: var(--radius-lg);
  border: 1px solid var(--border); box-shadow: var(--shadow);
  font-size: 12px;
}
.pdf-head { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 16px; border-bottom: 2px solid var(--primary); }

/* === TOAST === */
.toast {

}

.empty-state { text-align: center; padding: 80px 20px; color: var(--ink-mute); }

.quotes-layout { display: grid; grid-template-columns: 360px 1fr; gap: 16px; }
.quotes-list { display: flex; flex-direction: column; gap: 8px; max-height: 70vh; overflow-y: auto; }
.quote-row { background: white; padding: 12px 14px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }

.quote-row.selected { border-color: var(--primary); background: var(--primary-light); }
.quote-row-head { display: flex; justify-content: space-between; align-items: center; }
.quote-folio { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); }
.quote-status { font-size: 10px; padding: 2px 8px; border-radius: 100px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }

.qd-contact { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }

.contact-btn.whatsapp { background: var(--whatsapp); color: white; font-weight: 600; }
.qd-products h4, .qd-notes h4 { font-size: 12px; color: var(--primary); text-transform: uppercase; letter-spacing: 0.04em; margin: 16px 0 8px; }
.qd-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.qd-table th { background: var(--bg); padding: 8px 10px; text-align: left; font-size: 11px; text-transform: uppercase; color: var(--ink-mute); }
.qd-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }

.admin-catalog { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }

}
